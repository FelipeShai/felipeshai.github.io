<div class="space-y-8">
  @for (item of items; track item.company + item.period) {
    <article class="grid gap-4 border-b border-[#e5e5e7] pb-7 last:border-b-0 md:grid-cols-[170px_minmax(0,1fr)] md:gap-8">
      <div>
        <p class="text-sm font-normal tracking-wide text-[#86868b]">{{ item.period }}</p>
        <p class="mt-1 text-sm font-normal text-[#86868b]">{{ item.location }}</p>
      </div>

      <div class="space-y-3">
        <h3 class="text-xl font-semibold text-[#1d1d1f]">{{ item.company }}</h3>
        <p class="text-base font-normal text-[#1d1d1f]">{{ item.role }}</p>
        <p class="text-base leading-7 text-[#86868b]">{{ item.summary }}</p>

        <ul class="space-y-2">
          @for (highlight of item.highlights; track highlight) {
            <li class="text-sm leading-6 text-[#86868b]">{{ highlight }}</li>
          }
        </ul>
      </div>
    </article>
  }
</div>
