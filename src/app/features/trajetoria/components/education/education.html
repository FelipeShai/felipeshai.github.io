<div class="stack-lg">
	<p class="section-kicker">Formação</p>
	<div class="education-list">
		@for (item of items(); track item.institution + item.period) {
			<article class="education-item">
				<h3 class="education-item__institution">{{ item.institution }}</h3>
				<p class="education-item__title">{{ item.title }}</p>
				<p class="education-item__period">{{ item.period }}</p>
			</article>
		}
	</div>
</div>
